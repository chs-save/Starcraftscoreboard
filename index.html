<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>귀여운 대결 전광판 (실시간)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;      /* OBS/프릭샷 웹소스에서 투명하게 뚫리는 부분 */
    font-family: 'Jua', 'Fredoka', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body.preview {
    background:
      linear-gradient(45deg, #2a2a3555 25%, transparent 25%) 0 0/28px 28px,
      linear-gradient(-45deg, #2a2a3555 25%, transparent 25%) 0 0/28px 28px,
      linear-gradient(45deg, transparent 75%, #2a2a3555 75%) 0 0/28px 28px,
      linear-gradient(-45deg, transparent 75%, #2a2a3555 75%) 0 0/28px 28px,
      #1c1c26;
  }

  #board-wrap {
    position: fixed;
    top: 96px; left: 50%;
    --s: 1.0;                        /* 전체 크기 배율 (1 = 원본, 0.75 = 25% 작게, 0.5 = 절반) */
    transform: translateX(-50%) scale(var(--s));
    transform-origin: top center;
    display: flex; align-items: stretch;
    filter: drop-shadow(0 10px 22px rgba(0,0,0,.45));
    animation: floaty 4s ease-in-out infinite;
  }
  @keyframes floaty {
    0%,100% { transform: translateX(-50%) scale(var(--s)) translateY(0); }
    50%     { transform: translateX(-50%) scale(var(--s)) translateY(-5px); }
  }

  .team {
    display: flex; align-items: center; gap: 14px;
    height: 78px; padding: 0 26px; position: relative;
  }
  .team.left  { padding-right: 60px; border-radius: 40px 0 0 40px; }
  .team.right { padding-left: 60px;  border-radius: 0 40px 40px 0; flex-direction: row-reverse; }
  .team.left  { background: linear-gradient(100deg, #3f6bff 0%, #6d8bff 55%, #9fb4ff 100%); }
  .team.right { background: linear-gradient(260deg, #ff5a7e 0%, #ff8aa6 55%, #ffc0cf 100%); }
  .team::after {
    content:""; position:absolute; inset:0; border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0) 45%);
    pointer-events:none;
  }

  .logo {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,.85) center/cover no-repeat;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.9), 0 3px 8px rgba(0,0,0,.25);
    display: grid; place-items: center; font-size: 30px; line-height: 1;
    flex-shrink: 0; z-index:1;
  }
  .tname {
    color: #fff; font-size: 30px; letter-spacing: .5px;
    text-shadow: 0 2px 4px rgba(0,0,0,.35); white-space: nowrap; z-index:1;
  }

  .center {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 0 6px; margin: 0 -46px; z-index: 3;
  }

  /* 중앙 마스코트 (점수 위) */
  .mascot {
    position: absolute; left: 50%; bottom: 70px;
    transform: translateX(-50%);
    width: 104px; height: 104px; border-radius: 50%;
    background: #fff center/cover no-repeat;
    box-shadow: 0 0 0 4px #ffd23f, 0 0 26px 7px rgba(255,207,63,.75), 0 8px 16px rgba(0,0,0,.45);
    display: grid; place-items: center; font-size: 56px; line-height: 1;
    z-index: 6; animation: mbounce 2.4s ease-in-out infinite;
  }
  @keyframes mbounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%     { transform: translateX(-50%) translateY(-8px); }
  }

  .score-pill {
    display:flex; align-items:center; gap: 8px;
    height: 92px; padding: 0 22px; border-radius: 30px;
    background: linear-gradient(180deg, #2b2f45, #1a1d2e);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.14), 0 8px 18px rgba(0,0,0,.4);
  }
  .snum { font-size: 52px; color: #fff; min-width: 46px; text-align: center; text-shadow: 0 3px 0 rgba(0,0,0,.25); }
  .snum.l { color:#bcd0ff; } .snum.r { color:#ffc3d2; }
  .colon { font-size: 40px; color: #ffe066; transform: translateY(-3px); animation: pop 1.2s ease-in-out infinite; }
  @keyframes pop { 0%,100%{transform:translateY(-3px) scale(1)} 50%{transform:translateY(-3px) scale(1.18)} }

  /* 제목 리본 — .center(점수판) 기준 정렬 → 팀 이름 길이와 무관하게 항상 정중앙 */
  .ribbon {
    position:absolute; bottom:-42px; left:50%; transform:translateX(-50%);
    background:#ffd23f; color:#7a4a00; font-size:23px;
    padding:6px 26px 8px; border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.32); white-space:nowrap; z-index:4;
  }
  .ribbon::before{ content:"⭐ "; } .ribbon::after { content:" ⭐"; }

  .sparkle{ position:absolute; font-size:20px; animation: tw 2.2s ease-in-out infinite; pointer-events:none; z-index:4;}
  .sparkle.s1{ top:-6px; left:-14px; }
  .sparkle.s2{ bottom:-10px; right:-8px; animation-delay:.6s;}
  @keyframes tw { 0%,100%{opacity:.3; transform:scale(.8) rotate(0)} 50%{opacity:1; transform:scale(1.15) rotate(15deg)} }

  /* 조작 패널 */
  #panel {
    position: fixed; right: 18px; bottom: 18px; width: 300px;
    background: #1e2030f2; color:#e8e8f0; border-radius: 16px;
    padding: 16px 16px 18px; font-family: 'Fredoka', 'Jua', sans-serif;
    box-shadow: 0 12px 30px rgba(0,0,0,.5); z-index: 50; display: none;
  }
  #panel.show{ display:block; }
  #panel h3{ margin:0 0 4px; font-size:16px; color:#ffd23f;}
  #syncline{ font-size:11px; margin:0 0 10px; color:#8ad; }
  #syncline b{ color:#7CFC9A; }
  .row{ display:flex; align-items:center; gap:8px; margin:8px 0; }
  .row label{ width:56px; font-size:13px; color:#aab; flex-shrink:0;}
  .row input[type=text]{ flex:1; background:#2c2f45; border:1px solid #3d4160; color:#fff; border-radius:8px; padding:6px 9px; font-size:14px; font-family:inherit; }
  .row input[type=file]{ font-size:11px; color:#aab; width:100%;}
  .score-ctl{ display:flex; align-items:center; gap:6px; }
  .score-ctl button{ width:30px; height:30px; border:none; border-radius:8px; cursor:pointer; font-size:18px; font-weight:700; color:#fff; background:#3d4160; }
  .score-ctl button:hover{ background:#50557a; }
  .score-ctl .v{ width:26px; text-align:center; font-size:17px; color:#fff;}
  .blue button{ background:#3f6bff;} .blue button:hover{background:#5b82ff;}
  .pink button{ background:#ff5a7e;} .pink button:hover{background:#ff7593;}
  #panel .foot{ display:flex; gap:8px; margin-top:12px;}
  #panel .foot button{ flex:1; border:none; border-radius:8px; padding:8px; cursor:pointer; font-size:13px; font-family:inherit; color:#fff; }
  #btnReset{ background:#5a3d3d;} #btnReset:hover{background:#7a5050;}
  #btnPreview{ background:#3d5a4a;} #btnPreview:hover{background:#507a63;}
  .hint{ position:fixed; left:14px; bottom:14px; font-family:'Fredoka',sans-serif; font-size:12px; color:#ffffff88; z-index:40; transition:opacity .8s ease;}
  .hint.gone{ opacity:0; }
</style>
</head>
<body>

  <div id="board-wrap">
    <span class="sparkle s1">✨</span>
    <span class="sparkle s2">💫</span>

    <div class="team left">
      <div class="logo" id="logoL">🐰</div>
      <div class="tname" id="nameL">비송 1T</div>
    </div>

    <div class="center">
      <div class="mascot" id="mascot">⚡</div>
      <div class="score-pill">
        <span class="snum l" id="scoreL">1</span>
        <span class="colon">:</span>
        <span class="snum r" id="scoreR">2</span>
      </div>
      <div class="ribbon" id="ribbon">오늘의 대결</div>
    </div>

    <div class="team right">
      <div class="logo" id="logoR">🐻</div>
      <div class="tname" id="nameR">단슬 7P</div>
    </div>
  </div>

  <div class="hint" id="hint">키보드 <b>C</b> = 조작 패널 열기 / 닫기</div>

  <div id="panel">
    <h3>🎛️ 전광판 조작</h3>
    <p id="syncline">동기화: <b id="syncstat">연결 중…</b> · 이미지: <span id="imgstat" style="color:#ffd27c">-</span></p>

    <div class="row"><label>제목</label><input type="text" id="inRibbon" value="오늘의 대결"></div>
    <div class="row"><label>크기</label><input type="range" id="inScale" min="0.4" max="1.6" step="0.05" value="1" style="flex:1"><span id="scaleVal" style="width:46px;text-align:right;color:#ffd27c;font-size:13px">1.00×</span></div>
    <div class="row"><label>마스코트</label><input type="file" id="fileM" accept="image/*"></div>

    <div class="row"><label>왼쪽팀</label><input type="text" id="inNameL" value="비송 1T"></div>
    <div class="row"><label>로고</label><input type="file" id="fileL" accept="image/*"></div>
    <div class="row"><label>점수</label>
      <div class="score-ctl blue">
        <button data-t="L" data-d="-1">−</button>
        <span class="v" id="vL">1</span>
        <button data-t="L" data-d="1">+</button>
      </div>
    </div>

    <div class="row"><label>오른팀</label><input type="text" id="inNameR" value="단슬 7P"></div>
    <div class="row"><label>로고</label><input type="file" id="fileR" accept="image/*"></div>
    <div class="row"><label>점수</label>
      <div class="score-ctl pink">
        <button data-t="R" data-d="-1">−</button>
        <span class="v" id="vR">2</span>
        <button data-t="R" data-d="1">+</button>
      </div>
    </div>

    <div class="foot">
      <button id="btnPreview">배경 체크무늬 켜기</button>
      <button id="btnReset">0:0 리셋</button>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);

  /* ===== 동기화 채널 (이 채널명을 쓰는 창끼리만 값이 오감) ===== */
  const BROKER    = 'wss://broker.emqx.io:8084/mqtt';
  const TOPIC     = 'scb/chs-save/starcraft-7yq2x/state';   // 텍스트/점수
  const TOPIC_IMG = 'scb/chs-save/starcraft-7yq2x/imgs';    // 이미지(별도 채널)

  /* 이미지 상태 (조작 창에서 올리면 채널로 전송 → 프릭샷에 표시) */
  let imgs = { mascot:null, logoL:null, logoR:null };
  function applyImg(key){
    const el = $(key); if(!el) return;
    if(imgs[key]){ el.style.backgroundImage = `url(${imgs[key]})`; el.textContent = ''; }
  }
  function applyImgs(){ ['mascot','logoL','logoR'].forEach(applyImg); }

  /* 현재 상태 (텍스트/점수/크기 실시간 동기화) */
  let state = { title:'오늘의 대결', nameL:'비송 1T', nameR:'단슬 7P', sL:1, sR:2, scale:1.0 };
  let applying = false;   // 원격 수신 반영 중엔 재전송 막기

  function render(){
    $('ribbon').textContent = state.title || ' ';
    $('nameL').textContent  = state.nameL || ' ';
    $('nameR').textContent  = state.nameR || ' ';
    $('scoreL').textContent = state.sL; $('vL').textContent = state.sL;
    $('scoreR').textContent = state.sR; $('vR').textContent = state.sR;
    // 전체 크기 적용
    const sc = state.scale || 1;
    $('board-wrap').style.setProperty('--s', sc);
    if(document.activeElement !== $('inScale')){ $('inScale').value = sc; }
    $('scaleVal').textContent = Number(sc).toFixed(2) + '×';
    syncInput('inRibbon', state.title);
    syncInput('inNameL',  state.nameL);
    syncInput('inNameR',  state.nameR);
  }
  function syncInput(id, val){
    const el = $(id);
    if(document.activeElement !== el) el.value = val;   // 타이핑 중인 칸은 안 건드림
  }

  /* ===== MQTT 연결 ===== */
  let client = null, ready = false;
  function setStat(t){ $('syncstat').textContent = t; }
  try {
    client = mqtt.connect(BROKER, { connectTimeout: 8000, reconnectPeriod: 3000 });
    client.on('connect', ()=>{ ready = true; setStat('연결됨 ✅'); client.subscribe(TOPIC); client.subscribe(TOPIC_IMG); });
    client.on('reconnect', ()=> setStat('재연결 중…'));
    client.on('error', ()=> setStat('연결 오류'));
    client.on('close', ()=>{ ready=false; setStat('끊김'); });
    client.on('message', (t, msg)=>{
      try {
        const data = JSON.parse(msg.toString());
        if(t === TOPIC_IMG){
          imgs = Object.assign(imgs, data);
          applyImgs();
          setImgStat('수신됨 ✅');
        } else {
          state = Object.assign(state, data);
          applying = true; render(); applying = false;
        }
      } catch(e){}
    });
  } catch(e){ setStat('미지원'); }

  function publish(){
    if(client && ready){
      client.publish(TOPIC, JSON.stringify(state), { retain:true });
    }
  }
  function setImgStat(t){ const el=$('imgstat'); if(el) el.textContent=t; }
  function publishImg(){
    if(!(client && ready)){ setImgStat('오프라인'); return; }
    const payload = JSON.stringify(imgs);
    const kb = Math.round(payload.length/1024);
    setImgStat('전송 중… '+kb+'KB');
    try {
      client.publish(TOPIC_IMG, payload, { retain:true, qos:0 }, (err)=>{
        setImgStat(err ? ('전송실패: '+err.message) : ('전송됨 ✅ '+kb+'KB'));
      });
    } catch(e){ setImgStat('전송오류'); }
  }

  /* ===== 조작 → 상태 변경 + 전송 ===== */
  document.querySelectorAll('.score-ctl button').forEach(b=>{
    b.addEventListener('click', ()=>{
      const d = parseInt(b.dataset.d,10);
      if(b.dataset.t==='L') state.sL = Math.max(0, state.sL + d);
      else                  state.sR = Math.max(0, state.sR + d);
      render(); publish();
    });
  });
  ['inNameL','inNameR','inRibbon'].forEach(id=>{
    $(id).addEventListener('input', ()=>{
      if(applying) return;
      state.nameL = $('inNameL').value;
      state.nameR = $('inNameR').value;
      state.title = $('inRibbon').value;
      $('nameL').textContent  = state.nameL || ' ';
      $('nameR').textContent  = state.nameR || ' ';
      $('ribbon').textContent = state.title || ' ';
      publish();
    });
  });
  $('btnReset').addEventListener('click', ()=>{ state.sL=0; state.sR=0; render(); publish(); });

  /* 크기 슬라이더 → 실시간 반영 + 전송 */
  $('inScale').addEventListener('input', ()=>{
    if(applying) return;
    state.scale = parseFloat($('inScale').value);
    $('board-wrap').style.setProperty('--s', state.scale);
    $('scaleVal').textContent = state.scale.toFixed(2) + '×';
    publish();
  });

  /* 로고/마스코트 이미지 — 작게 압축해서 채널로 전송(실시간 동기화) */
  function compress(file, cb){
    const r = new FileReader();
    r.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 150;                        // 한 변 150px로 축소(용량 대폭 절약)
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        let out = cv.toDataURL('image/png');    // 우선 PNG(투명 유지)
        if(out.length > 90*1024){               // 그래도 크면 JPEG로 더 줄임
          const cv2 = document.createElement('canvas'); cv2.width=w; cv2.height=h;
          const c2 = cv2.getContext('2d');
          c2.fillStyle = '#ffffff'; c2.fillRect(0,0,w,h);   // 투명 대신 흰 배경
          c2.drawImage(img, 0, 0, w, h);
          out = cv2.toDataURL('image/jpeg', 0.82);
        }
        cb(out);
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  }
  function hookFile(inputId, key){
    $(inputId).addEventListener('change', e=>{
      const f = e.target.files[0]; if(!f) return;
      const done = durl => { imgs[key] = durl; applyImg(key); publishImg(); };
      if(f.type === 'image/gif'){
        // GIF은 압축(canvas)하면 첫 프레임만 남아 멈춤 → 원본 그대로 전송해 애니메이션 유지
        const r = new FileReader();
        r.onload = ev => done(ev.target.result);
        r.readAsDataURL(f);
      } else {
        compress(f, done);
      }
    });
  }
  hookFile('fileL','logoL'); hookFile('fileR','logoR'); hookFile('fileM','mascot');

  /* 미리보기 배경 토글 */
  $('btnPreview').addEventListener('click', ()=>{
    document.body.classList.toggle('preview');
    $('btnPreview').textContent = document.body.classList.contains('preview') ? '배경 체크무늬 끄기(투명)' : '배경 체크무늬 켜기';
  });

  /* C키 = 패널 토글 + 안내문구 잠깐 표시 */
  const hint = $('hint');
  let hintTimer = setTimeout(()=> hint.classList.add('gone'), 6000);
  document.addEventListener('keydown', e=>{
    if(e.key==='c' || e.key==='C' || e.key==='ㅊ'){
      $('panel').classList.toggle('show');
      hint.classList.remove('gone'); clearTimeout(hintTimer);
      hintTimer = setTimeout(()=> hint.classList.add('gone'), 6000);
    }
  });

  render();
</script>
</body>
</html>
