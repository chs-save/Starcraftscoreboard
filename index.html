<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>귀여운 대결 전광판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== OBS 브라우저 소스용: 배경 완전 투명 ===== */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;      /* ← 이 부분이 방송에서 투명하게 뚫림 */
    font-family: 'Jua', 'Fredoka', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* 미리보기 때만 보이는 체크무늬 (OBS에선 안 보이게 body에 클래스로 제어) */
  body.preview {
    background:
      linear-gradient(45deg, #2a2a3555 25%, transparent 25%) 0 0/28px 28px,
      linear-gradient(-45deg, #2a2a3555 25%, transparent 25%) 0 0/28px 28px,
      linear-gradient(45deg, transparent 75%, #2a2a3555 75%) 0 0/28px 28px,
      linear-gradient(-45deg, transparent 75%, #2a2a3555 75%) 0 0/28px 28px,
      #1c1c26;
  }

  /* ===== 전광판 전체 위치 (화면 상단 중앙) ===== */
  #board-wrap {
    position: fixed;
    top: 96px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: stretch;
    filter: drop-shadow(0 10px 22px rgba(0,0,0,.45));
    animation: floaty 4s ease-in-out infinite;
  }
  @keyframes floaty {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%     { transform: translateX(-50%) translateY(-5px); }
  }

  /* ===== 팀 패널 (좌/우 공통) ===== */
  .team {
    display: flex;
    align-items: center;
    gap: 14px;
    height: 78px;
    padding: 0 26px;
    position: relative;
  }
  .team.left  { padding-right: 60px; border-radius: 40px 0 0 40px; }
  .team.right { padding-left: 60px;  border-radius: 0 40px 40px 0; flex-direction: row-reverse; }

  .team.left {
    background: linear-gradient(100deg, #3f6bff 0%, #6d8bff 55%, #9fb4ff 100%);
  }
  .team.right {
    background: linear-gradient(260deg, #ff5a7e 0%, #ff8aa6 55%, #ffc0cf 100%);
  }
  /* 반짝이는 하이라이트 */
  .team::after {
    content:"";
    position:absolute; inset:0;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0) 45%);
    pointer-events:none;
  }

  /* 로고(이미지) 자리 — 여기에 이미지를 끼워 넣으면 됩니다 */
  .logo {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,.85) center/cover no-repeat;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.9), 0 3px 8px rgba(0,0,0,.25);
    display: grid; place-items: center;
    font-size: 30px; line-height: 1;
    flex-shrink: 0;
    z-index:1;
  }

  .tname {
    color: #fff;
    font-size: 30px;
    letter-spacing: .5px;
    text-shadow: 0 2px 4px rgba(0,0,0,.35);
    white-space: nowrap;
    z-index:1;
  }

  /* ===== 중앙 점수 ===== */
  .center {
    position: relative;              /* 마스코트 기준점 */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 6px;
    margin: 0 -46px;   /* 좌우 패널 살짝 겹치기 */
    z-index: 3;
  }

  /* ===== 중앙 마스코트 (점수 위에 둥둥) ===== */
  .mascot {
    position: absolute;
    left: 50%;
    bottom: 70px;                    /* 점수 알약 위로 띄우기 */
    transform: translateX(-50%);
    width: 104px; height: 104px;
    border-radius: 50%;
    background: #fff center/cover no-repeat;
    box-shadow:
      0 0 0 4px #ffd23f,
      0 0 26px 7px rgba(255,207,63,.75),
      0 8px 16px rgba(0,0,0,.45);
    display: grid; place-items: center;
    font-size: 56px; line-height: 1;
    z-index: 6;
    animation: mbounce 2.4s ease-in-out infinite;
  }
  @keyframes mbounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%     { transform: translateX(-50%) translateY(-8px); }
  }
  .score-pill {
    display:flex; align-items:center; gap: 8px;
    height: 92px;
    padding: 0 22px;
    border-radius: 30px;
    background: linear-gradient(180deg, #2b2f45, #1a1d2e);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.14), 0 8px 18px rgba(0,0,0,.4);
  }
  .snum {
    font-size: 52px;
    color: #fff;
    min-width: 46px;
    text-align: center;
    text-shadow: 0 3px 0 rgba(0,0,0,.25);
  }
  .snum.l { color:#bcd0ff; }
  .snum.r { color:#ffc3d2; }
  .colon {
    font-size: 40px;
    color: #ffe066;
    transform: translateY(-3px);
    animation: pop 1.2s ease-in-out infinite;
  }
  @keyframes pop { 0%,100%{transform:translateY(-3px) scale(1)} 50%{transform:translateY(-3px) scale(1.18)} }

  /* 위에 앉은 귀여운 왕관/타이틀 리본 */
  .ribbon {
    position:absolute;
    bottom:-16px; left:50%; transform:translateX(-50%);
    background:#ffd23f;
    color:#7a4a00;
    font-size:15px;
    padding:3px 16px 4px;
    border-radius:14px;
    box-shadow:0 3px 8px rgba(0,0,0,.3);
    white-space:nowrap;
    z-index:4;
  }
  .ribbon::before{ content:"⭐ "; }
  .ribbon::after { content:" ⭐"; }

  /* 반짝이 장식 */
  .sparkle{ position:absolute; font-size:20px; animation: tw 2.2s ease-in-out infinite; pointer-events:none; z-index:4;}
  .sparkle.s1{ top:-6px; left:-14px; }
  .sparkle.s2{ bottom:-10px; right:-8px; animation-delay:.6s;}
  .sparkle.s3{ top:52px; left:46%; animation-delay:1.1s; font-size:14px;}
  @keyframes tw { 0%,100%{opacity:.3; transform:scale(.8) rotate(0)} 50%{opacity:1; transform:scale(1.15) rotate(15deg)} }

  /* ===== 조작 패널 ===== */
  #panel {
    position: fixed;
    right: 18px; bottom: 18px;
    width: 300px;
    background: #1e2030f2;
    color:#e8e8f0;
    border-radius: 16px;
    padding: 16px 16px 18px;
    font-family: 'Fredoka', 'Jua', sans-serif;
    box-shadow: 0 12px 30px rgba(0,0,0,.5);
    z-index: 50;
    display: none;
  }
  #panel.show{ display:block; }
  #panel h3{ margin:0 0 10px; font-size:16px; color:#ffd23f;}
  .row{ display:flex; align-items:center; gap:8px; margin:8px 0; }
  .row label{ width:56px; font-size:13px; color:#aab; flex-shrink:0;}
  .row input[type=text]{
    flex:1; background:#2c2f45; border:1px solid #3d4160; color:#fff;
    border-radius:8px; padding:6px 9px; font-size:14px; font-family:inherit;
  }
  .row input[type=file]{ font-size:11px; color:#aab; width:100%;}
  .score-ctl{ display:flex; align-items:center; gap:6px; }
  .score-ctl button{
    width:30px; height:30px; border:none; border-radius:8px; cursor:pointer;
    font-size:18px; font-weight:700; color:#fff; background:#3d4160;
  }
  .score-ctl button:hover{ background:#50557a; }
  .score-ctl .v{ width:26px; text-align:center; font-size:17px; color:#fff;}
  .blue button{ background:#3f6bff;} .blue button:hover{background:#5b82ff;}
  .pink button{ background:#ff5a7e;} .pink button:hover{background:#ff7593;}
  #panel .foot{ display:flex; gap:8px; margin-top:12px;}
  #panel .foot button{
    flex:1; border:none; border-radius:8px; padding:8px; cursor:pointer;
    font-size:13px; font-family:inherit; color:#fff;
  }
  #btnReset{ background:#5a3d3d;} #btnReset:hover{background:#7a5050;}
  #btnPreview{ background:#3d5a4a;} #btnPreview:hover{background:#507a63;}
  .hint{ position:fixed; left:14px; bottom:14px; font-family:'Fredoka',sans-serif;
    font-size:12px; color:#ffffff88; z-index:40;
    transition: opacity .8s ease; }
  .hint.gone{ opacity:0; }
</style>
</head>
<body>

  <div id="board-wrap">
    <span class="sparkle s1">✨</span>
    <span class="sparkle s2">💫</span>
    <span class="sparkle s3">⭐</span>
    <div class="ribbon" id="ribbon">오늘의 대결</div>

    <!-- 왼쪽 팀 -->
    <div class="team left">
      <div class="logo" id="logoL">🐰</div>
      <div class="tname" id="nameL">비송 1T</div>
    </div>

    <!-- 중앙 점수 + 마스코트 -->
    <div class="center">
      <div class="mascot" id="mascot">⚡</div>
      <div class="score-pill">
        <span class="snum l" id="scoreL">1</span>
        <span class="colon">:</span>
        <span class="snum r" id="scoreR">2</span>
      </div>
    </div>

    <!-- 오른쪽 팀 -->
    <div class="team right">
      <div class="logo" id="logoR">🐻</div>
      <div class="tname" id="nameR">단슬 7P</div>
    </div>
  </div>

  <div class="hint" id="hint">키보드 <b>C</b> = 조작 패널 열기 / 닫기</div>

  <!-- 조작 패널 (OBS 화면엔 안 나오게, 미리보기 창에서만 사용) -->
  <div id="panel">
    <h3>🎛️ 전광판 조작</h3>

    <div class="row"><label>제목</label><input type="text" id="inRibbon" value="오늘의 대결"></div>
    <div class="row"><label>마스코트</label><input type="file" id="fileM" accept="image/*"></div>

    <div class="row"><label>왼쪽팀</label><input type="text" id="inNameL" value="비송 1T"></div>
    <div class="row"><label>로고</label><input type="file" id="fileL" accept="image/*"></div>
    <div class="row"><label>점수</label>
      <div class="score-ctl blue">
        <button data-t="L" data-d="-1">−</button>
        <span class="v" id="vL">1</span>
        <button data-t="L" data-d="1">+</button>
      </div>
    </div>

    <div class="row"><label>오른팀</label><input type="text" id="inNameR" value="단슬 7P"></div>
    <div class="row"><label>로고</label><input type="file" id="fileR" accept="image/*"></div>
    <div class="row"><label>점수</label>
      <div class="score-ctl pink">
        <button data-t="R" data-d="-1">−</button>
        <span class="v" id="vR">2</span>
        <button data-t="R" data-d="1">+</button>
      </div>
    </div>

    <div class="foot">
      <button id="btnPreview">배경 체크무늬 켜기</button>
      <button id="btnReset">0:0 리셋</button>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  let sL = 1, sR = 2;

  function paint(){
    $('scoreL').textContent = sL; $('vL').textContent = sL;
    $('scoreR').textContent = sR; $('vR').textContent = sR;
  }

  // 점수 버튼
  document.querySelectorAll('.score-ctl button').forEach(b=>{
    b.addEventListener('click', ()=>{
      const d = parseInt(b.dataset.d,10);
      if(b.dataset.t==='L') sL = Math.max(0, sL+d);
      else                  sR = Math.max(0, sR+d);
      paint();
    });
  });

  // 텍스트 입력 실시간 반영
  $('inNameL').addEventListener('input', e=> $('nameL').textContent = e.target.value || ' ');
  $('inNameR').addEventListener('input', e=> $('nameR').textContent = e.target.value || ' ');
  $('inRibbon').addEventListener('input', e=> $('ribbon').textContent = e.target.value || ' ');

  // 로고 이미지 업로드 → 원 안에 채우기
  function hookFile(inputId, logoId){
    $(inputId).addEventListener('change', e=>{
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = ev=>{
        const el = $(logoId);
        el.style.backgroundImage = `url(${ev.target.result})`;
        el.textContent = '';               // 이모지 지우기
      };
      r.readAsDataURL(f);
    });
  }
  hookFile('fileL','logoL');
  hookFile('fileR','logoR');
  hookFile('fileM','mascot');

  // 리셋
  $('btnReset').addEventListener('click', ()=>{ sL=0; sR=0; paint(); });

  // 미리보기 배경 토글 (OBS에 넣기 전에 확인용)
  $('btnPreview').addEventListener('click', ()=>{
    document.body.classList.toggle('preview');
    $('btnPreview').textContent =
      document.body.classList.contains('preview') ? '배경 체크무늬 끄기(투명)' : '배경 체크무늬 켜기';
  });

  // C키로 패널 열기/닫기
  document.addEventListener('keydown', e=>{
    if(e.key==='c' || e.key==='C' || e.key==='ㅊ'){
      $('panel').classList.toggle('show');
    }
  });

  paint();

  // 안내 문구 6초 뒤 자동 숨김 (방송 화면에 안 남게). C키 누르면 다시 잠깐 표시.
  const hint = $('hint');
  let hintTimer = setTimeout(()=> hint.classList.add('gone'), 6000);
  document.addEventListener('keydown', e=>{
    if(e.key==='c' || e.key==='C' || e.key==='ㅊ'){
      hint.classList.remove('gone');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(()=> hint.classList.add('gone'), 6000);
    }
  });
</script>
</body>
</html>
